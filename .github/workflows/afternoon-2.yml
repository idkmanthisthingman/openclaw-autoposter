name: Afternoon Tweet 2
on:
  schedule:
    - cron: '5 8 * * *' # 13:35 IST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Restore cookies
        run: |
          if [ -n "$COOKIES_JSON" ]; then
            echo "$COOKIES_JSON" > state/cookies.json
          fi
        env:
          COOKIES_JSON: ${{ secrets.X_COOKIES }}

      - name: Post tweet 2
        run: node src/post.js --batch afternoon --index 1
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Save cookies to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cookies-afternoon-2
          path: state/cookies.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/agent-state.json
          git diff --cached --quiet || git commit -m "Update state after afternoon tweet 2"
          git push
